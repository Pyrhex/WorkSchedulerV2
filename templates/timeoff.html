{% extends "base.html" %}

{% block content %}
  <div class="content-inner">
    <section class="schedule-header">
    </section>

    <!-- New Request Form -->
    <div class="table-card page-card page-card-sm" style="margin-bottom: 24px;" id="new-request-form">
      <div class="table-title">New Time Off Request</div>
      <div class="card-body">
        <form method="post" action="/timeoff/new" id="timeoff-form">
          <div class="stack-md">
            <label>
              <div class="field-label">Employee Name</div>
              <input class="field-input" name="name" list="employee-list" required placeholder="Select or type name" />
              <datalist id="employee-list">
                {% for e in employees %}
                  <option value="{{ e.name }}">{{ e.name }}</option>
                {% endfor %}
              </datalist>
            </label>
            <label>
              <div class="field-label">Role</div>
              <select class="field-input" name="role" required>
                {% for sec in sections %}
                  <option value="{{ sec.name }}">{{ sec.name }}</option>
                {% endfor %}
              </select>
            </label>
            <div class="form-grid-2">
              <label>
                <div class="field-label">From</div>
                <input class="field-input" type="date" name="from" required />
              </label>
              <label>
                <div class="field-label">To</div>
                <input class="field-input" type="date" name="to" required />
              </label>
            </div>
            <div class="inline-toggle-group" style="margin-top:4px;">
              <label class="switch" title="Mark as approved">
                <input type="checkbox" name="approved" checked>
                <span class="slider"></span>
              </label>
              <span class="toggle-label" style="font-size:12px; color:#475569;">Approved</span>
              <label class="switch" title="Mark as vacation" style="margin-left:8px;">
                <input type="checkbox" name="vacation">
                <span class="slider"></span>
              </label>
              <span class="toggle-label" style="font-size:12px; color:#475569;">Vacation</span>
            </div>
            <div class="form-actions">
              <button class="btn primary" type="submit">Create</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div class="table-card page-card" style="max-width: 700px;">
      <div class="table-title">Requests</div>
      <div class="sidebar-inner">
        <ul class="timeoff-list">
          {% for item in time_off %}
            <li class="timeoff-item" data-id="{{ item.id }}">
              <div class="info">
                <div class="name">{{ item.name }} <span class="role">({{ item.role }})</span></div>
                <div class="dates">{{ item.label }}
                  <span class="status {{ 'approved' if item.approved else 'pending' }}" data-status>{{ '✔️' if item.approved else 'pending' }}</span>
                </div>
              </div>
              <div class="actions" style="display:flex; align-items:center; gap:8px;">
                <label class="switch" title="Toggle Approved">
                  <input type="checkbox" class="timeoff-toggle" {% if item.approved %}checked{% endif %} />
                  <span class="slider"></span>
                </label>
                <span class="toggle-label" style="font-size:12px; color:#475569;">Approved</span>
                <label class="switch" title="Toggle Vacation" style="margin-left:8px;">
                  <input type="checkbox" class="timeoff-type-toggle" {% if item.vacation %}checked{% endif %} />
                  <span class="slider"></span>
                </label>
                <span class="toggle-label" style="font-size:12px; color:#475569;">Vacation</span>
                <button class="timeoff-delete" data-id="{{ item.id }}" type="button" title="Delete request" aria-label="Delete {{ item.name }}">×</button>
              </div>
            </li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </div>
{% endblock %}
