{% extends "base.html" %}

{% block content %}
  <div class="content-inner">
    <div class="table-card page-card page-card-sm">
      <div class="table-title">New Time Off Request</div>
      <div class="card-body">
        {% if error %}
          <div class="banner success" style="background:#fef2f2;border-color:#fecaca;color:#991b1b;">{{ error }}</div>
        {% endif %}
        <form method="post" action="/timeoff/new">
          <div class="stack-md">
            <label>
              <div class="field-label">Employee Name</div>
              <input class="field-input" name="name" list="employee-list" required placeholder="Select or type name" />
              <datalist id="employee-list">
                {% for e in employees %}
                  <option value="{{ e.name }}">{{ e.name }}</option>
                {% endfor %}
              </datalist>
            </label>
            <label>
              <div class="field-label">Role</div>
              <select class="field-input" name="role" required>
                {% for sec in sections %}
                  <option value="{{ sec.name }}">{{ sec.name }}</option>
                {% endfor %}
              </select>
            </label>
            <div class="form-grid-2">
              <label>
                <div class="field-label">From</div>
                <input class="field-input" type="date" name="from" required />
              </label>
              <label>
                <div class="field-label">To</div>
                <input class="field-input" type="date" name="to" required />
              </label>
            </div>
            <label style="display:flex; align-items:center; gap:8px;">
              <input type="checkbox" name="approved" /> Approved
            </label>
            <label style="display:flex; align-items:center; gap:8px;">
              <input type="checkbox" name="vacation" /> Vacation
            </label>
            <div class="form-actions">
              <button class="btn primary" type="submit">Create</button>
              <a class="btn ghost" href="/timeoff">Cancel</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
